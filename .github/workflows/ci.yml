name: SecureCommerce CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Tests, lint, and security
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            services/catalog-service/requirements.txt
            services/catalog-service/requirements-dev.txt
            services/orders-service/requirements.txt
            services/orders-service/requirements-dev.txt

      - name: Install dependencies
        run: make install

      - name: Run unit tests
        run: make test

      - name: Run lint checks
        run: make lint

      - name: Run security checks
        run: make security

  container:
    name: Container build and Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build catalog-service image
        run: docker build -t secure-commerce/catalog-service:ci services/catalog-service

      - name: Build orders-service image
        run: docker build -t secure-commerce/orders-service:ci services/orders-service

      - name: Validate Docker Compose config
        run: docker compose config
